<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 12" shape-rendering="crispEdges">
  <!-- Ear tips -->
  <rect x="1" y="0" width="1" height="1"/>
  <rect x="10" y="0" width="1" height="1"/>
  <!-- Ear sides -->
  <rect x="1" y="1" width="2" height="1"/>
  <rect x="9" y="1" width="2" height="1"/>
  <!-- Ear bases -->
  <rect x="0" y="2" width="3" height="1"/>
  <rect x="9" y="2" width="3" height="1"/>
  <!-- Head top -->
  <rect x="0" y="3" width="12" height="1"/>
  <!-- Eye line (single-pixel gaps at col 2 and col 9) -->
  <rect x="0" y="4" width="2" height="1"/>
  <rect x="3" y="4" width="6" height="1"/>
  <rect x="10" y="4" width="2" height="1"/>
  <!-- Face fill -->
  <rect x="0" y="5" width="12" height="4"/>
  <!-- Chin curve -->
  <rect x="1" y="9" width="10" height="1"/>
  <rect x="2" y="10" width="8" height="1"/>
  <rect x="3" y="11" width="6" height="1"/>
</svg>
